name: Godot Headless Web Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    timeout-minutes: 25
    env:
      EXPORT_PRESET: Web
      EXPORT_OUTPUT: build/web/index.html
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Godot version
        run: |
          set -eu
          which godot
          godot --version

      - name: Validate export preset exists
        run: |
          set -eu
          test -f export_presets.cfg
          grep -q 'name="Web"' export_presets.cfg

      - name: Import project in headless mode
        run: |
          set -eu
          godot --headless --path . --import --quit

      - name: Export Web build
        run: |
          set -eu
          mkdir -p build/web
          godot --headless --path . --export-release "${EXPORT_PRESET}" "${EXPORT_OUTPUT}"
          test -f "${EXPORT_OUTPUT}"
          find build/web -maxdepth 2 -type f | sort

      - name: Upload Web artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yinqi-web-export
          path: build/web
          if-no-files-found: error
