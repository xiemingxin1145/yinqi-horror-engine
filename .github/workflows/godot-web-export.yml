name: Godot Headless Web Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-export:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Blender for Godot importer
        run: |
          set -eu
          sudo apt-get update -qq
          sudo apt-get install -y blender
          which blender
          blender --version | head -n 2
          echo "Blend files in repository, if any:"
          find . -name '*.blend' -print || true

      - name: Configure Godot editor settings
        run: |
          set -eu
          mkdir -p "${HOME}/.config/godot"
          cat > "${HOME}/.config/godot/editor_settings-4.tres" <<'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          filesystem/import/blender/blender_path = "/usr/bin/blender"
          EOF
          cat "${HOME}/.config/godot/editor_settings-4.tres"

      - name: Export Web build with Godot
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.2.2/Godot_v4.2.2-stable_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Web
          export_debug: false
          archive_output: true
          use_preset_export_path: true
          cache: true
          verbose: true

      - name: Show exported files
        run: |
          set -eu
          echo "Build directory: ${{ steps.export.outputs.build_directory }}"
          echo "Archive directory: ${{ steps.export.outputs.archive_directory }}"
          find "${{ steps.export.outputs.build_directory }}" -maxdepth 3 -type f | sort || true
          find "${{ steps.export.outputs.archive_directory }}" -maxdepth 3 -type f | sort || true

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinqi-web-export
          path: |
            ${{ steps.export.outputs.build_directory }}
            ${{ steps.export.outputs.archive_directory }}
          if-no-files-found: error
