name: Validate Yinqi Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          paths = list(Path('data').rglob('*.json')) + list(Path('manifest').rglob('*.json')) + list(Path('godot').rglob('*.json'))
          print(f'Checking {len(paths)} JSON files')
          for path in paths:
              with open(path, 'r', encoding='utf-8-sig') as f:
                  json.load(f)
              print('OK', path)
          PY

      - name: Validate required project files
        run: |
          test -f project.godot
          test -f scenes/MapDebug.tscn
          test -f src/MainLoop.gd
          test -f src/viewpoints/ViewpointDirector.gd
          test -f src/hotspots/HotspotController.gd
          test -f src/rendering/SceneEffectExecutor.gd
          test -f manifest/assets_manifest.json

      - name: Validate V0.1 viewpoint asset bindings
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('data/viewpoints/viewpoints.example.json').read_text(encoding='utf-8'))
          required = ['village_gate_front','village_gate_left','village_gate_right','river_bridge_front','river_bridge_rail','river_bridge_ground']
          by_id = {item['id']: item for item in data['viewpoints']}
          for key in required:
              assert key in by_id, f'missing viewpoint {key}'
              assert by_id[key].get('background_asset','').startswith('res://assets/backgrounds/'), f'missing background_asset for {key}'
          print('V0.1 viewpoint bindings OK')
          PY

      - name: Asset binary reminder
        run: |
          echo 'NOTE: This workflow validates manifests and bindings. PNG binaries should be uploaded under assets/backgrounds, assets/characters, assets/icons before final Godot export.'
